<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZZEE's Camping Inventory</title>
    <meta name="description" content="ZZEE camping gear inventory for auto camping and backpacking." />
    <style>
      :root {
        --bg: #f4f6f0;
        --paper: #fffefa;
        --ink: #171f18;
        --muted: #697164;
        --line: #dce0d2;
        --owned: #3f8f55;
        --wishlist: #e4b733;
        --dream: #d94b43;
        --accent: #ff6b35;
        --shadow: 0 16px 40px rgba(23, 31, 24, 0.08);
        --radius: 8px;
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        line-height: 1.55;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1240px, calc(100% - 36px));
        margin: 0 auto;
        padding: 28px 0 72px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 24px;
      }

      .back,
      .mode-label {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 900;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
        gap: 22px;
        align-items: end;
        margin-bottom: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(135deg, #fffefa 0%, #edf5ea 64%, #fff0e9 100%);
        box-shadow: var(--shadow);
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.15;
      }

      h1 {
        font-size: clamp(34px, 6vw, 64px);
      }

      .lead {
        max-width: 700px;
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        min-height: 86px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.76);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        font-size: 25px;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px 180px 180px;
        gap: 10px;
        margin-bottom: 18px;
      }

      input,
      select,
      textarea,
      button {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        font: inherit;
      }

      input,
      select {
        min-height: 40px;
        padding: 0 12px;
      }

      textarea {
        min-height: 88px;
        padding: 10px 12px;
        resize: vertical;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        font-weight: 900;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 18px;
        align-items: start;
      }

      .inventory {
        display: grid;
        gap: 18px;
      }

      .section {
        display: grid;
        gap: 12px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
      }

      .section-head h2 {
        font-size: 23px;
      }

      .section-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .gear-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .gear-card {
        position: relative;
        display: grid;
        grid-template-rows: 116px auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-top: 5px solid var(--status-color);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: 0 10px 26px rgba(23, 31, 24, 0.05);
        text-align: left;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .gear-card:hover {
        border-color: var(--status-color);
        box-shadow: var(--shadow);
        transform: translateY(-3px);
      }

      .gear-image {
        position: relative;
        overflow: hidden;
        background: #eef2e8;
      }

      .gear-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand-logo {
        position: absolute;
        right: 10px;
        bottom: 10px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.88);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
      }

      .brand-logo img {
        width: 23px;
        height: 23px;
        object-fit: contain;
      }

      .gear-body {
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .gear-card.is-packed {
        outline: 3px solid color-mix(in srgb, var(--status-color) 44%, white);
        outline-offset: -6px;
      }

      .gear-title {
        display: grid;
        gap: 4px;
      }

      .gear-title strong {
        font-size: 14px;
        line-height: 1.25;
      }

      .gear-title span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .gear-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .meta-box {
        padding: 7px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fafbf7;
      }

      .meta-box span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .meta-box strong {
        display: block;
        margin-top: 2px;
        font-size: 12px;
      }

      .status {
        display: inline-flex;
        width: fit-content;
        min-height: 24px;
        align-items: center;
        padding: 0 9px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--status-color) 14%, white);
        color: var(--status-color);
        font-size: 11px;
        font-weight: 900;
      }

      .card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .card-action {
        min-height: 30px;
        padding: 0 8px;
        border-radius: 6px;
        font-size: 11px;
      }

      .card-action:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .card-action.pack {
        border-color: var(--status-color);
        color: var(--status-color);
      }

      .card-action.memo {
        background: #20231f;
        color: white;
      }

      aside {
        position: sticky;
        top: 18px;
        display: grid;
        gap: 14px;
      }

      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: 0 10px 26px rgba(23, 31, 24, 0.04);
      }

      .panel h2 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      .form-grid {
        display: grid;
        gap: 9px;
      }

      .form-grid label,
      .modal-form label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .legend {
        display: grid;
        gap: 8px;
      }

      .legend span {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 900;
      }

      .dot {
        display: inline-block;
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--dot);
      }

      .pack-table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        font-size: 12px;
      }

      .pack-table th,
      .pack-table td {
        padding: 8px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .pack-table th {
        background: #edf4e9;
        color: #344536;
        font-size: 11px;
        text-transform: uppercase;
      }

      .pack-table td:nth-child(3),
      .pack-table th:nth-child(3) {
        text-align: right;
        white-space: nowrap;
      }

      .pack-table tr:last-child td {
        border-bottom: 0;
      }

      .checklist {
        min-height: 170px;
        width: 100%;
        margin-top: 10px;
        font-size: 12px;
      }

      .panel-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .required-list,
      .meal-grid {
        display: grid;
        gap: 8px;
      }

      .required-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .required-item,
      .meal-card {
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fafbf7;
        font-size: 11px;
      }

      .required-item.is-covered {
        border-color: color-mix(in srgb, var(--owned) 45%, var(--line));
        background: color-mix(in srgb, var(--owned) 9%, white);
      }

      .required-item.is-missing {
        border-color: color-mix(in srgb, var(--dream) 45%, var(--line));
        background: color-mix(in srgb, var(--dream) 8%, white);
      }

      .meal-card {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 9px;
        align-items: center;
      }

      .meal-card img {
        width: 42px;
        height: 42px;
        border-radius: 7px;
        object-fit: cover;
      }

      .meal-card strong,
      .required-item strong {
        display: block;
        line-height: 1.25;
      }

      .meal-card span,
      .required-item span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
      }

      .modal.is-open {
        display: block;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(17, 24, 18, 0.48);
      }

      .modal-panel {
        position: relative;
        width: min(840px, calc(100% - 28px));
        max-height: calc(100vh - 44px);
        margin: 22px auto;
        overflow: auto;
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .modal-content {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .modal-image {
        width: 100%;
        height: 100%;
        min-height: 420px;
        object-fit: cover;
        background: #eef2e8;
      }

      .modal-body {
        padding: 20px;
      }

      .modal-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .modal-title h2 {
        font-size: 25px;
      }

      .close {
        display: grid;
        width: 36px;
        min-height: 36px;
        place-items: center;
        padding: 0;
        border-radius: 999px;
      }

      .modal-form {
        display: grid;
        gap: 10px;
      }

      .rating-row {
        display: grid;
        grid-template-columns: 1fr 56px;
        gap: 10px;
        align-items: center;
      }

      @media (max-width: 1080px) {
        header,
        .layout {
          grid-template-columns: 1fr;
        }

        aside {
          position: static;
        }

        .gear-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 24px, 1240px);
          padding-top: 18px;
        }

        header,
        .controls {
          grid-template-columns: 1fr;
        }

        header {
          padding: 18px;
        }

        .stats,
        .modal-content {
          grid-template-columns: 1fr;
        }

        .gear-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .modal-image {
          min-height: 240px;
          aspect-ratio: 16 / 10;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <a class="back" href="../index.html">← ZZEE Index</a>
        <span class="mode-label">Card Inventory</span>
      </div>

      <header>
        <div>
          <h1>🏕 ZZEE's Camping Inventory</h1>
          <p class="lead">오토캠핑과 백패킹 장비를 카드로 관리하는 로컬 인벤토리. 보유 장비의 총 무게, 구매 금액, 백패킹 무게를 자동 계산한다.</p>
        </div>
        <div class="stats" id="stats"></div>
      </header>

      <div class="controls">
        <input id="searchInput" type="search" placeholder="장비명, 브랜드, 카테고리 검색" />
        <select id="statusFilter" aria-label="상태 필터">
          <option value="All">All Status</option>
          <option value="Owned">Owned</option>
          <option value="Wishlist">Wishlist</option>
          <option value="Dream Gear">Dream Gear</option>
        </select>
        <select id="sectionFilter" aria-label="섹션 필터">
          <option value="All">All Sections</option>
          <option value="Shared Gear">Shared Gear</option>
          <option value="Backpacking">Backpacking</option>
          <option value="Auto Camping">Auto Camping</option>
        </select>
        <select id="categoryFilter" aria-label="카테고리 필터">
          <option value="All">All Categories</option>
        </select>
      </div>

      <div class="layout">
        <div class="inventory" id="inventory"></div>

        <aside>
          <section class="panel">
            <h2>Status</h2>
            <div class="legend">
              <span><b><i class="dot" style="--dot: var(--owned)"></i> Owned</b> 초록</span>
              <span><b><i class="dot" style="--dot: var(--wishlist)"></i> Wishlist</b> 노랑</span>
              <span><b><i class="dot" style="--dot: var(--dream)"></i> Dream Gear</b> 빨강</span>
            </div>
          </section>

          <section class="panel">
            <h2>Backpacking Preview</h2>
            <div id="packSummary" class="lead"></div>
            <div id="requiredList" class="required-list"></div>
            <div id="packTable"></div>
            <textarea class="checklist" id="checklistOutput" spellcheck="false"></textarea>
            <div class="panel-actions">
              <button type="button" id="copyChecklist">Copy</button>
              <button type="button" id="resetPack">Reset</button>
            </div>
          </section>

          <section class="panel">
            <h2>Meal Menu</h2>
            <div id="mealPlan" class="meal-grid"></div>
          </section>

          <section class="panel">
            <h2>Add Local Item</h2>
            <form class="form-grid" id="gearForm">
              <label>Section
                <select name="section">
                  <option>Shared Gear</option>
                  <option>Backpacking</option>
                  <option>Auto Camping</option>
                </select>
              </label>
              <label>Category <input name="category" placeholder="Kitchen, Shelter, Chair..." required /></label>
              <label>Brand <input name="brand" placeholder="Helinox" required /></label>
              <label>Item <input name="item" placeholder="Gear name" required /></label>
              <label>Weight <input name="weight" placeholder="510g" /></label>
              <label>Price <input name="price" placeholder="₩180,000" /></label>
              <label>Status
                <select name="status">
                  <option>Wishlist</option>
                  <option>Owned</option>
                  <option>Dream Gear</option>
                </select>
              </label>
              <label>Image URL <input name="image" placeholder="https://..." /></label>
              <label>Brand Logo URL <input name="logo" placeholder="https://..." /></label>
              <label>Purchase Link <input name="purchaseLink" placeholder="https://..." /></label>
              <button class="primary" type="submit">Add to Local List</button>
            </form>
          </section>
        </aside>
      </div>
    </main>

    <div class="modal" id="gearModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content" id="modalContent"></div>
      </div>
    </div>

    <script>
      const statusColor = {
        Owned: "var(--owned)",
        Wishlist: "var(--wishlist)",
        "Dream Gear": "var(--dream)",
      };

      const logoByBrand = {

      const productImageByItem = {
        "Helinox Chair Zero (Sand)": "https://helinox.com/cdn/shop/files/carousel_A.jpg?v=1781710313&width=700",
        "Helinox Table One": "https://helinox.com/cdn/shop/files/web_table_one_black_1.jpg?v=1698962684&width=700",

      const fallbackImageFor = (category, brand, item) =>
        `https://placehold.co/900x640/f4f6f0/172018?text=${encodeURIComponent(`${brand}\n${item}\n${category}`)}`;

      const imageFor = (category, brand, item) =>
        productImageByItem[item] || fallbackImageFor(category, brand, item);

      const mealImageFor = (label) =>
        `https://placehold.co/480x360/fff7ed/172018?text=${encodeURIComponent(label)}`;

      const baseGear = [
        ["Shared Gear", "Chair", "Helinox", "Helinox Chair Zero (Sand)", "510g", "₩180,000", "Owned"],

        ["Backpacking", "Backpack", "Gregory", "Gregory Focal 48", "1270g", "₩280,000", "Wishlist"],
        ["Backpacking", "Backpack", "Yamatomichi", "Yamatomichi MINI2", "470g", "₩420,000", "Dream Gear"],
        ["Backpacking", "Shelter", "Naturehike", "Naturehike Mongar UL 1P", "1480g", "-", "Owned"],
        ["Backpacking", "Sleep System", "Naturehike", "Naturehike LD350 Sleeping Bag", "760g", "-", "Owned"],
        ["Backpacking", "Sleep System", "Naturehike", "Naturehike 280 Down Sleeping Bag", "560g", "₩150,000", "Wishlist"],
        ["Backpacking", "Sleep System", "Comet", "Comet Foam Pad", "340g", "-", "Owned"],
        ["Backpacking", "Sleep System", "PUROMONTE", "PUROMONTE Short Self Inflating Pad", "390g", "₩150,000", "Wishlist"],
        ["Backpacking", "Sleep System", "NEMO", "NEMO Ora Short Mummy", "375g", "₩150,000", "Wishlist"],
        ["Backpacking", "Cooking", "Barocook", "Barocook 850ml", "230g", "₩35,000", "Wishlist"],
        ["Backpacking", "Tools", "SUSA", "SUSA MH-1 Peg Hammer", "285g", "₩15,000", "Wishlist"],
        ["Backpacking", "Tools", "SUSA", "Forged Stakes + Carabiners", "300g", "₩20,000", "Wishlist"],
        ["Auto Camping", "Furniture", "Helinox", "Helinox Sunset Chair (Black)", "1450g", "₩210,000", "Wishlist"],
        ["Auto Camping", "Furniture", "Snow Peak", "Snow Peak Entry IGT", "6500g", "₩250,000", "Dream Gear"],
        ["Auto Camping", "Kitchen", "Snow Peak", "Snow Peak Home & Camp Burner", "1400g", "₩160,000", "Wishlist"],
        ["Auto Camping", "Kitchen", "Snow Peak", "Snow Peak Trek 900", "175g", "₩65,000", "Wishlist"],
        ["Auto Camping", "Kitchen", "Stanley", "Stanley Adventure Cook Set", "440g", "₩60,000", "Wishlist"],
        ["Auto Camping", "Cooler", "Dometic", "Dometic Patrol 20", "8300g", "₩280,000", "Dream Gear"],
        ["Auto Camping", "Lighting", "Claymore", "Claymore ULTRA3.0 M", "860g", "₩130,000", "Wishlist"],
        ["Auto Camping", "Fire", "Snow Peak", "Snow Peak Pack & Carry Fireplace S", "1800g", "₩180,000", "Dream Gear"],
        ["Auto Camping", "Wagon", "Coleman", "Coleman Outdoor Wagon", "11000g", "₩140,000", "Wishlist"],
      ].map(([section, category, brand, item, weight, price, status], index) => ({
        id: `base-${index}-${item.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`,
        section,
        category,
        brand,
        item,
        weight,
        price,
        status,
        image: imageFor(category, brand, item),
        logo: logoByBrand[brand] || imageFor(category, brand, item),
        purchaseLink: "",
      }));

      const requiredPackCategories = [
        { key: "Backpack", label: "가방", match: ["Backpack"] },
        { key: "Shelter", label: "텐트/쉘터", match: ["Shelter"] },
        { key: "Sleeping Bag", label: "침낭", match: ["Sleep System"] },
        { key: "Sleeping Pad", label: "침대/패드", items: ["Comet Foam Pad", "PUROMONTE Short Self Inflating Pad", "NEMO Ora Short Mummy"] },
        { key: "Lighting", label: "랜턴/헤드랜턴", match: ["Lantern", "Headlamp", "Lighting"] },
        { key: "Cooking", label: "취사/발열", match: ["Cooking", "Kitchen"] },
        { key: "Power", label: "보조배터리", match: ["Power Bank"] },
        { key: "Tools", label: "툴/팩망치", match: ["Tools", "Trekking Pole"] },
      ];

      const mealPlan = [
        { type: "Breakfast", name: "오트밀 + 견과 + 꿀", weight: "80g", method: "Hot water", image: mealImageFor("Oatmeal") },
        { type: "Lunch", name: "또띠아 + 참치 pouch", weight: "180g", method: "No-cook", image: mealImageFor("Tuna Wrap") },
        { type: "Dinner", name: "바로쿡 발열 도시락 + 즉석밥", weight: "320g", method: "Barocook", image: mealImageFor("Barocook Meal") },
        { type: "Dinner", name: "동결건조 비빔밥/달밧", weight: "120g", method: "Freeze-dried", image: mealImageFor("Freeze Dried") },
        { type: "Late snack", name: "라면 + 육포/참치", weight: "160g", method: "Hot water", image: mealImageFor("Ramen") },
        { type: "Snack", name: "트레일믹스 + 에너지바", weight: "150g", method: "No-cook", image: mealImageFor("Trail Mix") },
        { type: "Drink", name: "전해질 타블렛 + 커피", weight: "30g", method: "Hydration", image: mealImageFor("Coffee") },
      ];

      const localKey = "zzee-camping-local-gear";
      const notesKey = "zzee-camping-gear-notes";
      const packKey = "zzee-camping-pack-preview";
      const localGear = JSON.parse(localStorage.getItem(localKey) || "[]");
      let notes = JSON.parse(localStorage.getItem(notesKey) || "{}");
      let selectedPackIds = new Set(JSON.parse(localStorage.getItem(packKey) || "[]"));

      const allGear = () => [...baseGear, ...localGear];
      const isBackpackingCandidate = (gear) => gear.section === "Backpacking" || gear.section === "Shared Gear";
      const weightNumber = (weight) => Number(String(weight).replace(/[^0-9.]/g, "")) || 0;
      const priceNumber = (price) => Number(String(price).replace(/[^0-9]/g, "")) || 0;
      const won = (value) => value ? `₩${value.toLocaleString("ko-KR")}` : "-";
      const gram = (value) => value >= 1000 ? `${(value / 1000).toFixed(2)}kg` : `${Math.round(value)}g`;
      const $ = (selector) => document.querySelector(selector);

      const ensureDefaultPack = () => {
        if (selectedPackIds.size) return;
        allGear()
          .filter((gear) => gear.status === "Owned" && isBackpackingCandidate(gear))
          .forEach((gear) => selectedPackIds.add(gear.id));
        localStorage.setItem(packKey, JSON.stringify([...selectedPackIds]));
      };

      const syncPackSelection = () => {
        const packableIds = new Set(
          allGear()
            .filter((gear) => gear.status === "Owned" && isBackpackingCandidate(gear))
            .map((gear) => gear.id)
        );
        selectedPackIds = new Set([...selectedPackIds].filter((id) => packableIds.has(id)));
        localStorage.setItem(packKey, JSON.stringify([...selectedPackIds]));
      };

      const filters = () => ({
        query: $("#searchInput").value.trim().toLowerCase(),
        status: $("#statusFilter").value,
        section: $("#sectionFilter").value,
        category: $("#categoryFilter").value,
      });

      const filteredGear = () => {
        const filter = filters();
        return allGear().filter((gear) => {
          const haystack = [gear.section, gear.category, gear.brand, gear.item, gear.weight, gear.price, gear.status].join(" ").toLowerCase();
          return (!filter.query || haystack.includes(filter.query)) &&
            (filter.status === "All" || gear.status === filter.status) &&
            (filter.section === "All" || gear.section === filter.section) &&
            (filter.category === "All" || gear.category === filter.category);
        });
      };

      const renderCategoryOptions = () => {
        const current = $("#categoryFilter").value;
        const categories = [...new Set(allGear().map((gear) => gear.category))].sort((a, b) => a.localeCompare(b));
        $("#categoryFilter").innerHTML = `<option value="All">All Categories</option>${categories.map((category) => `<option>${category}</option>`).join("")}`;
        $("#categoryFilter").value = categories.includes(current) ? current : "All";
      };

      const renderStats = (gear) => {
        const owned = allGear().filter((item) => item.status === "Owned");
        const wishlist = allGear().filter((item) => item.status === "Wishlist");
        const dream = allGear().filter((item) => item.status === "Dream Gear");
        const ownedWeight = owned.reduce((sum, item) => sum + weightNumber(item.weight), 0);
        const ownedCost = owned.reduce((sum, item) => sum + priceNumber(item.price), 0);
        const backpackingWeight = allGear()
          .filter((item) => selectedPackIds.has(item.id))
          .reduce((sum, item) => sum + weightNumber(item.weight), 0);
        const futureBudget = [...wishlist, ...dream].reduce((sum, item) => sum + priceNumber(item.price), 0);
        $("#stats").innerHTML = `
          <div class="stat"><span>Owned</span><strong>${owned.length}</strong></div>
          <div class="stat"><span>Wishlist</span><strong>${wishlist.length}</strong></div>
          <div class="stat"><span>Dream Gear</span><strong>${dream.length}</strong></div>
          <div class="stat"><span>Total Weight</span><strong>${gram(ownedWeight)}</strong></div>
          <div class="stat"><span>Purchase Total</span><strong>${won(ownedCost)}</strong></div>
          <div class="stat"><span>Pack Preview</span><strong>${gram(backpackingWeight)}</strong></div>
          <div class="stat"><span>Future Budget</span><strong>${won(futureBudget)}</strong></div>
          <div class="stat"><span>Visible Cards</span><strong>${gear.length}</strong></div>
          <div class="stat"><span>Categories</span><strong>${new Set(allGear().map((item) => item.category)).size}</strong></div>
        `;
      };

      const gearCard = (gear) => `
        <article class="gear-card ${selectedPackIds.has(gear.id) ? "is-packed" : ""}" data-gear-id="${gear.id}" style="--status-color: ${statusColor[gear.status]}">
          <div class="gear-image">
            <img src="${gear.image}" alt="${gear.item}" loading="lazy" onerror="this.src='${fallbackImageFor(gear.category, gear.brand, gear.item)}'" />
            <span class="brand-logo"><img src="${gear.logo}" alt="${gear.brand} logo" loading="lazy" onerror="this.src='${imageFor(gear.category, gear.brand, gear.item)}'" /></span>
          </div>
          <div class="gear-body">
            <div class="gear-title">
              <span>${gear.section} · ${gear.category}</span>
              <strong>${gear.item}</strong>
            </div>
            <span class="status">${gear.status}</span>
            <div class="gear-meta">
              <div class="meta-box"><span>Weight</span><strong>${gear.weight || "-"}</strong></div>
              <div class="meta-box"><span>Price</span><strong>${gear.price || "-"}</strong></div>
            </div>
            <div class="card-actions">
              <button class="card-action pack" type="button" data-pack-id="${gear.id}" ${gear.status === "Owned" && isBackpackingCandidate(gear) ? "" : "disabled"}>${selectedPackIds.has(gear.id) ? "Packed" : gear.status === "Owned" ? "Pack" : "Owned only"}</button>
              <button class="card-action memo" type="button" data-memo-id="${gear.id}">Memo</button>
            </div>
          </div>
        </article>
      `;

      const requirementCovered = (requirement, items) =>
        items.some((gear) => {
          const categoryMatch = requirement.match?.includes(gear.category);
          const itemMatch = requirement.items?.includes(gear.item);
          return categoryMatch || itemMatch;
        });

      const renderRequiredList = (items) => {
        $("#requiredList").innerHTML = requiredPackCategories.map((requirement) => {
          const covered = requirementCovered(requirement, items);
          return `
            <div class="required-item ${covered ? "is-covered" : "is-missing"}">
              <strong>${covered ? "✓" : "!"} ${requirement.label}</strong>
              <span>${covered ? "covered" : "missing"}</span>
            </div>
          `;
        }).join("");
      };

      const renderMealPlan = () => {
        $("#mealPlan").innerHTML = mealPlan.map((meal) => `
          <div class="meal-card">
            <img src="${meal.image}" alt="${meal.name}" loading="lazy" />
            <div>
              <strong>${meal.name}</strong>
              <span>${meal.type} · ${meal.method} · ${meal.weight}</span>
            </div>
          </div>
        `).join("");
      };

      const buildChecklist = (items) => {
        const totalWeight = items.reduce((sum, item) => sum + weightNumber(item.weight), 0);
        const totalPrice = items.reduce((sum, item) => sum + priceNumber(item.price), 0);
        const missing = requiredPackCategories.filter((requirement) => !requirementCovered(requirement, items));
        return [
          "# Backpacking Gear Checklist",
          `Total Weight: ${gram(totalWeight)}`,
          `Total Purchase Price: ${won(totalPrice)}`,
          "",
          "## Required Coverage",
          ...requiredPackCategories.map((requirement) => `- [${requirementCovered(requirement, items) ? "x" : " "}] ${requirement.label}`),
          "",
          ...items.map((gear) => `- [ ] ${gear.category} | ${gear.item} | ${gear.weight || "-"} | ${gear.status}`),
          "",
          "## Meal Menu",
          ...mealPlan.map((meal) => `- [ ] ${meal.type} | ${meal.name} | ${meal.method} | ${meal.weight}`),
          "",
          missing.length ? `Missing: ${missing.map((item) => item.label).join(", ")}` : "Missing: none",
        ].join("\n");
      };

      const renderPackPreview = () => {
        const items = allGear()
          .filter((gear) => selectedPackIds.has(gear.id))
          .sort((a, b) => a.section.localeCompare(b.section) || a.category.localeCompare(b.category));
        const totalWeight = items.reduce((sum, item) => sum + weightNumber(item.weight), 0);
        const totalPrice = items.reduce((sum, item) => sum + priceNumber(item.price), 0);
        $("#packSummary").textContent = `${items.length} items · ${gram(totalWeight)} · ${won(totalPrice)}`;
        renderRequiredList(items);
        renderMealPlan();
        $("#packTable").innerHTML = items.length ? `
          <table class="pack-table">
            <thead><tr><th>Category</th><th>Item</th><th>Weight</th></tr></thead>
            <tbody>
              ${items.map((gear) => `<tr><td>${gear.category}</td><td>${gear.item}</td><td>${gear.weight || "-"}</td></tr>`).join("")}
            </tbody>
          </table>
        ` : `<p class="lead">Pack 버튼으로 백패킹 미리보기 장비를 담아보세요.</p>`;
        $("#checklistOutput").value = buildChecklist(items);
      };

      const renderInventory = () => {
        syncPackSelection();
        renderCategoryOptions();
        const gear = filteredGear();
        renderStats(gear);
        renderPackPreview();
        const sections = ["Shared Gear", "Backpacking", "Auto Camping"];
        $("#inventory").innerHTML = sections.map((section) => {
          const items = gear.filter((item) => item.section === section);
          if (!items.length) return "";
          const weight = items.filter((item) => item.status === "Owned").reduce((sum, item) => sum + weightNumber(item.weight), 0);
          return `
            <section class="section">
              <div class="section-head">
                <div>
                  <h2>${section}</h2>
                  <p>${items.length} items · owned weight ${gram(weight)}</p>
                </div>
              </div>
              <div class="gear-grid">${items.map(gearCard).join("")}</div>
            </section>
          `;
        }).join("") || `<section class="section"><h2>No Gear</h2><p class="lead">조건에 맞는 장비가 없습니다.</p></section>`;
      };

      const openModal = (gear) => {
        const note = notes[gear.id] || {};
        $("#modalContent").innerHTML = `
          <img class="modal-image" src="${gear.image}" alt="${gear.item}" onerror="this.src='${fallbackImageFor(gear.category, gear.brand, gear.item)}'" />
          <div class="modal-body">
            <div class="modal-title">
              <div>
                <span class="status" style="--status-color: ${statusColor[gear.status]}">${gear.status}</span>
                <h2 id="modalTitle">${gear.item}</h2>
                <p class="lead">${gear.brand} · ${gear.section} · ${gear.category} · ${gear.weight || "-"} · ${gear.price || "-"}</p>
              </div>
              <button class="close" type="button" data-close-modal>×</button>
            </div>
            <form class="modal-form" id="noteForm">
              <label>Purchase Date <input name="purchaseDate" value="${note.purchaseDate || ""}" placeholder="2026-07-06" /></label>
              <label>Purchase Link <input name="purchaseLink" value="${note.purchaseLink || gear.purchaseLink || ""}" placeholder="https://..." /></label>
              <label>Satisfaction
                <div class="rating-row">
                  <input name="satisfaction" type="range" min="0" max="5" step="0.5" value="${note.satisfaction || 0}" />
                  <output>${note.satisfaction || 0}/5</output>
                </div>
              </label>
              <label>Use Review <textarea name="review" placeholder="사용 후기, 장단점, 다음 캠핑에서 확인할 점">${note.review || ""}</textarea></label>
              <button class="primary" type="submit">Save Memo</button>
            </form>
          </div>
        `;
        $("#gearModal").classList.add("is-open");
        $("#gearModal").setAttribute("aria-hidden", "false");
        const range = $("#noteForm input[type='range']");
        const output = $("#noteForm output");
        range.addEventListener("input", () => output.textContent = `${range.value}/5`);
        $("#noteForm").addEventListener("submit", (event) => {
          event.preventDefault();
          notes[gear.id] = Object.fromEntries(new FormData(event.currentTarget));
          localStorage.setItem(notesKey, JSON.stringify(notes));
          closeModal();
        });
      };

      const closeModal = () => {
        $("#gearModal").classList.remove("is-open");
        $("#gearModal").setAttribute("aria-hidden", "true");
      };

      $("#gearForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const brand = data.brand.trim();
        const item = data.item.trim();
        localGear.push({
          ...data,
          id: `local-${Date.now()}-${item.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`,
          brand,
          item,
          image: data.image || imageFor(data.category, brand, item),
          logo: data.logo || logoByBrand[brand] || imageFor(data.category, brand, item),
        });
        localStorage.setItem(localKey, JSON.stringify(localGear));
        event.currentTarget.reset();
        renderInventory();
      });

      ["#searchInput", "#statusFilter", "#sectionFilter", "#categoryFilter"].forEach((selector) => {
        $(selector).addEventListener("input", renderInventory);
      });

      $("#inventory").addEventListener("click", (event) => {
        const packButton = event.target.closest("[data-pack-id]");
        const memoButton = event.target.closest("[data-memo-id]");

        if (packButton) {
          const id = packButton.dataset.packId;
          if (selectedPackIds.has(id)) {
            selectedPackIds.delete(id);
          } else {
            selectedPackIds.add(id);
          }
          localStorage.setItem(packKey, JSON.stringify([...selectedPackIds]));
          renderInventory();
          return;
        }

        if (memoButton) {
          const gear = allGear().find((item) => item.id === memoButton.dataset.memoId);
          if (gear) openModal(gear);
        }
      });

      $("#copyChecklist").addEventListener("click", async () => {
        await navigator.clipboard?.writeText($("#checklistOutput").value);
      });

      $("#resetPack").addEventListener("click", () => {
        selectedPackIds = new Set();
        ensureDefaultPack();
        renderInventory();
      });

      $("#gearModal").addEventListener("click", (event) => {
        if (event.target.closest("[data-close-modal]")) closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });

      ensureDefaultPack();
      renderInventory();
    </script>
  </body>
</html>
