<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZZEE Blog Automation</title>
    <meta name="description" content="네이버 블로그 자동화 입력 도우미." />
    <style>
      :root {
        --bg: #f6f7f3;
        --paper: #fffefa;
        --ink: #181a17;
        --muted: #686d62;
        --line: #dedfd4;
        --accent: #2f6f8f;
        --orange: #ff6b35;
        --shadow: 0 16px 40px rgba(24, 26, 23, 0.08);
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
        letter-spacing: 0;
      }

      .shell {
        width: min(1040px, calc(100% - 36px));
        margin: 0 auto;
        padding: 28px 0 70px;
      }

      a {
        color: inherit;
      }

      .back {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        margin-bottom: 22px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
      }

      header {
        margin-bottom: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, #fffefa 0%, #edf5f8 64%, #fff0e9 100%);
        box-shadow: var(--shadow);
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.15;
      }

      h1 {
        font-size: clamp(34px, 6vw, 62px);
      }

      .lead {
        max-width: 720px;
        margin: 12px 0 0;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 10px 26px rgba(24, 26, 23, 0.04);
      }

      .panel h2 {
        margin-bottom: 12px;
        font-size: 20px;
      }

      form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      input,
      textarea,
      select,
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        color: var(--ink);
        font: inherit;
      }

      input,
      select {
        min-height: 40px;
        padding: 0 12px;
      }

      textarea {
        min-height: 96px;
        padding: 10px 12px;
        resize: vertical;
      }

      button {
        min-height: 42px;
        padding: 0 14px;
        font-weight: 900;
        cursor: pointer;
      }

      .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .output {
        min-height: 560px;
        width: 100%;
        white-space: pre-wrap;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .guide {
        margin-top: 16px;
      }

      .guide ol {
        margin: 8px 0 0;
        padding-left: 22px;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back" href="../index.html">← ZZEE Index</a>
      <header>
        <h1>Blog Automation</h1>
        <p class="lead">네이버 블로그 자동화용 `입력.txt`를 빠르게 만드는 로컬 폼. 매장 폴더에 넣을 텍스트를 만들고 복사하거나 다운로드한다.</p>
      </header>

      <div class="layout">
        <section class="panel">
          <h2>Input Builder</h2>
          <form id="blogForm">
            <label>
              Store Name
              <input name="store" placeholder="멘쇼" required />
            </label>
            <label>
              Area
              <input name="area" placeholder="건대 / 성수 / ..." />
            </label>
            <label>
              Category
              <select name="category">
                <option>맛집</option>
                <option>카페</option>
                <option>술집</option>
                <option>여행</option>
                <option>공연</option>
              </select>
            </label>
            <label>
              One-line Comment
              <input name="comment" placeholder="쫄깃한 츠케멘이 좋은 곳" />
            </label>
            <label>
              Must Include
              <textarea name="must" placeholder="메뉴, 가격, 웨이팅, 분위기, 재방문 의사 등"></textarea>
            </label>
            <label>
              Photo Order Memo
              <textarea name="photos" placeholder="1. 외관&#10;2. 메뉴판&#10;3. 대표 메뉴"></textarea>
            </label>
            <label>
              Tone
              <select name="tone">
                <option>재리 말투, 자연스럽고 솔직하게</option>
                <option>정보 중심으로 깔끔하게</option>
                <option>후기 중심으로 생생하게</option>
              </select>
            </label>
            <button class="primary" type="submit">Generate Text</button>
          </form>

          <div class="guide panel">
            <h2>Workflow</h2>
            <ol>
              <li>네이버블로그 폴더 안에 매장 폴더를 만든다.</li>
              <li>이 폼으로 `입력.txt` 내용을 만든다.</li>
              <li>`실행하기.bat`에서 3번 메뉴로 원고와 업로드 레시피를 만든다.</li>
              <li>5번 또는 6번 메뉴로 업로드를 보조한다.</li>
            </ol>
          </div>
        </section>

        <section class="panel">
          <h2>입력.txt Preview</h2>
          <textarea class="output" id="output" spellcheck="false"></textarea>
          <div class="actions">
            <button type="button" id="copyButton">Copy</button>
            <button type="button" id="downloadButton">Download 입력.txt</button>
            <button type="button" id="clearButton">Clear</button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const output = document.querySelector("#output");
      const storageKey = "zzee-blog-input-draft";

      const template = (data) => `매장명: ${data.store || ""}
지역: ${data.area || ""}
카테고리: ${data.category || ""}
한줄평: ${data.comment || ""}

필수 포함 내용:
${data.must || "-"}

사진 순서 메모:
${data.photos || "-"}

작성 톤:
${data.tone || "재리 말투, 자연스럽고 솔직하게"}

요청:
- 네이버 블로그용 원고로 작성
- 제목 후보 5개 제안
- 도입부는 자연스럽게
- 메뉴/분위기/가격/재방문 의사를 분리해서 정리
- 과장하지 말고 솔직한 후기 느낌 유지
`;

      output.value = localStorage.getItem(storageKey) || "";

      document.querySelector("#blogForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(event.currentTarget));
        output.value = template(data);
        localStorage.setItem(storageKey, output.value);
      });

      output.addEventListener("input", () => localStorage.setItem(storageKey, output.value));

      document.querySelector("#copyButton").addEventListener("click", async () => {
        await navigator.clipboard?.writeText(output.value);
      });

      document.querySelector("#downloadButton").addEventListener("click", () => {
        const blob = new Blob([output.value], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "입력.txt";
        link.click();
        URL.revokeObjectURL(link.href);
      });

      document.querySelector("#clearButton").addEventListener("click", () => {
        output.value = "";
        localStorage.removeItem(storageKey);
      });
    </script>
  </body>
</html>
