<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZZEE's Food Map</title>
    <meta name="description" content="재리 맛집도 🍽️" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      async
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script defer src="./js/data.js"></script>
    <script defer src="./js/naver-shared-restaurants.js"></script>
    <script defer src="./js/map.js"></script>
    <script defer src="./js/app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="ZZEE's Food Map 홈">
        <span class="brand-mark">J</span>
        <span><strong>ZZEE's Food Map</strong></span>
      </a>

      <div class="header-actions">
        <button class="update-button" id="updateIndicator" type="button" hidden>Update 0</button>
        <button class="icon-button" id="addToggle" type="button" aria-label="맛집 추가 열기" title="맛집 추가">
          <span aria-hidden="true">+</span>
        </button>
        <button class="icon-button" id="themeToggle" type="button" aria-label="다크모드 전환" title="다크모드">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <main class="app-shell">
      <section class="list-pane" aria-labelledby="archiveTitle">
        <div class="intro">
          <h1 id="archiveTitle">재리 맛집도 🍽️</h1>
          <p>반박시 님 말이 맞음 😎</p>
        </div>

        <form class="controls" id="controls" role="search">
          <label class="search-field">
            <span class="visually-hidden">맛집 검색</span>
            <input id="searchInput" type="search" placeholder="가게명, 동, 메뉴, 코멘트 검색" autocomplete="off" />
          </label>

          <div class="control-group" aria-label="카테고리 필터">
            <button class="chip is-active" type="button" data-filter="category" data-value="전체">전체</button>
            <button class="chip" type="button" data-filter="category" data-value="한식">한식</button>
            <button class="chip" type="button" data-filter="category" data-value="중식">중식</button>
            <button class="chip" type="button" data-filter="category" data-value="일식">일식</button>
            <button class="chip" type="button" data-filter="category" data-value="양식">양식</button>
            <button class="chip" type="button" data-filter="category" data-value="아시아">아시아</button>
            <button class="chip" type="button" data-filter="category" data-value="햄부기">햄부기</button>
            <button class="chip" type="button" data-filter="category" data-value="멕시칸">멕시칸</button>
            <button class="chip" type="button" data-filter="category" data-value="고인물">고인물</button>
            <button class="chip" type="button" data-filter="category" data-value="디저트">디저트</button>
          </div>

          <div class="filter-row">
            <label>
              <span>별점</span>
              <select id="ratingFilter">
                <option value="0">전체</option>
                <option value="5">★★★★★</option>
                <option value="4">★★★★ 이상</option>
                <option value="3">★★★ 이상</option>
                <option value="2">★★ 이상</option>
              </select>
            </label>

            <label>
              <span>정렬</span>
              <select id="sortSelect">
                <option value="recommended">추천순</option>
                <option value="rating">별점순</option>
                <option value="name">가나다순</option>
              </select>
            </label>
          </div>
        </form>

        <section class="quick-section" aria-labelledby="recentTitle">
          <div class="section-heading">
            <h2 id="recentTitle">최근 본 맛집</h2>
            <button class="text-button" id="clearRecent" type="button">비우기</button>
          </div>
          <div class="recent-list" id="recentList" aria-live="polite"></div>
        </section>

        <div class="result-summary" id="resultSummary"></div>
        <section class="restaurant-grid" id="restaurantList" aria-live="polite"></section>
      </section>

      <aside class="map-pane" aria-label="맛집 지도">
        <div class="map-toolbar">
          <div>
            <strong>Map</strong>
            <span id="mapStatus">CARTO 지도 준비 중</span>
          </div>
          <button class="text-button" id="fitMap" type="button">전체 보기</button>
        </div>
        <div id="map" class="map-canvas"></div>
      </aside>
    </main>

    <div class="modal" id="detailModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop" data-close-modal></div>
      <article class="modal-panel">
        <button class="icon-button modal-close" type="button" data-close-modal aria-label="상세 닫기">×</button>
        <div id="modalContent"></div>
      </article>
    </div>

    <aside class="add-panel" id="addPanel" aria-hidden="true" aria-labelledby="addTitle">
      <div class="add-panel-backdrop" data-close-add></div>
      <section class="add-panel-card">
        <div class="add-panel-head">
          <div>
            <p class="eyebrow">비공개 추가</p>
            <h2 id="addTitle">맛집 추가</h2>
          </div>
          <button class="icon-button" type="button" data-close-add aria-label="맛집 추가 닫기">×</button>
        </div>
        <form class="add-form" id="addRestaurantForm">
          <input id="editRestaurantId" name="editId" type="hidden" />
          <label>
            <span>비밀번호</span>
            <input id="addPassword" name="password" type="password" inputmode="numeric" autocomplete="off" required />
          </label>
          <label>
            <span>가게명</span>
            <input name="name" type="text" required />
          </label>
          <label class="span-2">
            <span>한줄평</span>
            <input name="comment" type="text" placeholder="가볍게 메모" required />
          </label>
          <label class="span-2">
            <span>주소</span>
            <input name="address" type="text" required />
          </label>
          <label>
            <span>검증 상태</span>
            <select name="verificationStatus">
              <option value="검증전">검증전</option>
              <option value="검증후">검증후</option>
            </select>
          </label>
          <section class="edit-fields span-2" data-edit-fields hidden>
            <label>
              <span>지역</span>
              <select name="area">
                <option value="건대">건대</option>
                <option value="성수">성수</option>
                <option value="기타">기타</option>
              </select>
            </label>
            <label>
              <span>카테고리</span>
              <select name="category">
                <option value="한식">한식</option>
                <option value="중식">중식</option>
                <option value="일식">일식</option>
                <option value="양식">양식</option>
                <option value="아시아">아시아</option>
                <option value="디저트">디저트</option>
                <option value="햄부기">햄부기</option>
                <option value="멕시칸">멕시칸</option>
                <option value="고인물">고인물</option>
              </select>
            </label>
            <label>
              <span>재리 별점</span>
              <input name="rating" type="number" min="0" max="5" step="0.5" />
            </label>
            <label>
              <span>대표 메뉴</span>
              <input name="signatureMenu" type="text" />
            </label>
            <label>
              <span>가격대</span>
              <input name="priceRange" type="text" />
            </label>
            <label>
              <span>분위기</span>
              <input name="mood" type="text" />
            </label>
            <label class="span-2">
              <span>재리 코멘트</span>
              <textarea name="jaeComment" rows="3"></textarea>
            </label>
            <label class="span-2">
              <span>메뉴 목록</span>
              <textarea name="menuItems" rows="3" placeholder="메뉴명 | 가격"></textarea>
            </label>
            <label class="span-2">
              <span>대표 이미지 URL</span>
              <input name="image" type="url" />
            </label>
            <label>
              <span>카카오 평점</span>
              <input name="kakaoRating" type="number" min="0" max="5" step="0.1" />
            </label>
            <label>
              <span>네이버 평점</span>
              <input name="naverRating" type="number" min="0" max="5" step="0.01" />
            </label>
            <label>
              <span>구글 평점</span>
              <input name="googleRating" type="number" min="0" max="5" step="0.1" />
            </label>
            <label class="span-2">
              <span>카카오 링크</span>
              <input name="kakaoMapLink" type="url" />
            </label>
            <label class="span-2">
              <span>네이버 링크</span>
              <input name="naverMapLink" type="url" />
            </label>
            <label class="span-2">
              <span>구글 링크</span>
              <input name="googleMapLink" type="url" />
            </label>
          </section>
          <button class="text-button add-submit" type="submit">검증전으로 추가</button>
          <p class="form-message" id="addFormMessage" aria-live="polite"></p>
        </form>
      </section>
    </aside>
  </body>
</html>
